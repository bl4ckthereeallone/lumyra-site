<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lumyra Key System</title>
<link rel="icon" href="data:,"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:       #06060a;
  --bg1:      #0c0c12;
  --bg2:      #111118;
  --border:   rgba(255,255,255,0.055);
  --border2:  rgba(255,255,255,0.10);
  --accent:   #5b6af8;
  --accent2:  #8b96ff;
  --txt:      #ececf0;
  --txt2:     #666678;
  --txt3:     #333340;
  --green:    #3ecf8e;
  --red:      #ff6b6b;
  --yellow:   #f5c842;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
  color: var(--txt);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

.orb { position: fixed; border-radius: 50%; filter: blur(120px); pointer-events: none; z-index: 0; }
.orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(91,106,248,0.10) 0%, transparent 70%); top: -150px; left: -150px; }
.orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(62,207,142,0.06) 0%, transparent 70%); bottom: -100px; right: -100px; }

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: radial-gradient(circle, rgba(255,255,255,0.035) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events: none;
  z-index: 0;
}

.card {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 2rem;
  animation: rise 0.6s cubic-bezier(0.16,1,0.3,1) both;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.02), 0 40px 80px rgba(0,0,0,0.5);
}

@keyframes rise {
  from { opacity:0; transform: translateY(20px) scale(0.97); }
  to   { opacity:1; transform: translateY(0) scale(1); }
}

.card::before {
  content: '';
  position: absolute;
  top: -1px; left: 50%;
  transform: translateX(-50%);
  width: 50%; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  border-radius: 2px;
  opacity: 0.7;
}

.header { display: flex; align-items: center; gap: 0.85rem; margin-bottom: 1.75rem; }

.logo {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, rgba(91,106,248,0.25), rgba(91,106,248,0.08));
  border: 1px solid rgba(91,106,248,0.25);
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 1rem; color: var(--accent2);
  flex-shrink: 0; box-shadow: 0 0 20px rgba(91,106,248,0.12);
}

.header-info { flex: 1; }

.header-title {
  font-size: 0.95rem; font-weight: 600; letter-spacing: -0.01em;
  color: var(--txt); display: flex; align-items: center; gap: 0.5rem;
}
.header-title span { color: var(--accent2); }

.header-sub {
  font-size: 0.7rem; color: var(--txt2); margin-top: 2px;
  font-weight: 400; font-family: 'IBM Plex Mono', monospace;
}

.version-badge {
  font-size: 0.6rem; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--txt3);
  background: var(--bg2); border: 1px solid var(--border);
  padding: 0.18rem 0.55rem; border-radius: 5px; margin-left: auto;
}

.divider { height: 1px; background: var(--border); margin-bottom: 1.5rem; }

.key-section { margin-bottom: 1.25rem; display: none; }
.key-section.visible { display: block; animation: slideDown 0.3s cubic-bezier(0.16,1,0.3,1); }

@keyframes slideDown {
  from { opacity:0; transform: translateY(-10px); }
  to   { opacity:1; transform: translateY(0); }
}

.key-label {
  font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.12em;
  color: var(--txt3); font-weight: 600; margin-bottom: 0.55rem;
}

.key-box {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 14px; padding: 1rem 1.1rem; transition: border-color 0.2s;
}
.key-box:hover { border-color: var(--border2); }

.key-top { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.75rem; }

.key-value {
  font-family: 'IBM Plex Mono', monospace; font-size: 0.83rem;
  color: #b8bfff; letter-spacing: 0.04em; word-break: break-all;
  line-height: 1.5; flex: 1;
}

.copy-btn {
  background: var(--bg2); color: var(--txt2); border: 1px solid var(--border);
  padding: 0.4rem 0.9rem; border-radius: 8px; font-size: 0.72rem; font-weight: 600;
  font-family: 'Syne', sans-serif; cursor: pointer; transition: all 0.15s;
  white-space: nowrap; flex-shrink: 0;
}
.copy-btn:hover { background: #1a1a24; border-color: var(--border2); color: var(--txt); }
.copy-btn.ok { background: rgba(62,207,142,0.1); border-color: rgba(62,207,142,0.2); color: var(--green); }

.expiry-row { display: flex; align-items: center; gap: 0.6rem; }
.expiry-bar-wrap { flex: 1; height: 3px; background: var(--bg2); border-radius: 99px; overflow: hidden; }
.expiry-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 99px; transition: width 1s linear; }
.expiry-text { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--txt2); white-space: nowrap; min-width: 60px; text-align: right; }

.gen-btn {
  width: 100%; background: var(--accent); color: #fff; border: none;
  padding: 0.9rem; border-radius: 13px; font-size: 0.875rem; font-weight: 600;
  font-family: 'Syne', sans-serif; cursor: pointer; letter-spacing: -0.01em;
  transition: background 0.2s, transform 0.15s, opacity 0.2s;
  margin-bottom: 1rem; position: relative; overflow: hidden;
}
.gen-btn::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, transparent 60%);
  pointer-events: none;
}
.gen-btn:hover:not(:disabled) { background: #6b7bff; transform: translateY(-1px); }
.gen-btn:active:not(:disabled) { transform: translateY(0); }
.gen-btn:disabled { background: var(--bg2); color: var(--txt3); cursor: not-allowed; border: 1px solid var(--border); }

.spin {
  display: inline-block; width: 12px; height: 12px;
  border: 1.5px solid rgba(255,255,255,0.15); border-radius: 50%;
  border-top-color: rgba(255,255,255,0.75);
  animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.alert {
  display: none; align-items: flex-start; gap: 0.6rem;
  padding: 0.75rem 1rem; border-radius: 11px; font-size: 0.78rem;
  margin-bottom: 1rem; line-height: 1.45; animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
.alert.show { display: flex; }
.alert.err  { background: rgba(255,107,107,0.07); border: 1px solid rgba(255,107,107,0.15); color: var(--red); }
.alert.info { background: rgba(62,207,142,0.07);  border: 1px solid rgba(62,207,142,0.15);  color: var(--green); }
.alert.warn { background: rgba(245,200,66,0.07);  border: 1px solid rgba(245,200,66,0.15);  color: var(--yellow); }
.alert-icon { font-size: 0.85rem; flex-shrink: 0; line-height: 1.45; }

.info-list {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 14px; padding: 1rem 1.1rem;
  display: flex; flex-direction: column; gap: 0.6rem;
}
.info-row { display: flex; align-items: center; gap: 0.65rem; font-size: 0.77rem; color: var(--txt2); font-weight: 400; }
.info-row::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--accent); opacity: 0.5; flex-shrink: 0; }

.footer { text-align: center; color: var(--txt3); font-size: 0.62rem; margin-top: 1.5rem; letter-spacing: 0.05em; font-family: 'IBM Plex Mono', monospace; }

.locked-overlay {
  position: absolute; inset: 0; background: rgba(6,6,10,0.92);
  border-radius: 24px; display: none; align-items: center;
  justify-content: center; flex-direction: column; gap: 0.6rem;
  z-index: 10; backdrop-filter: blur(6px);
}
.locked-overlay.show { display: flex; }
.lock-icon      { font-size: 2rem; }
.lock-title     { font-size: 0.9rem; font-weight: 600; color: var(--txt); }
.lock-sub       { font-size: 0.75rem; color: var(--txt2); font-family: 'IBM Plex Mono', monospace; }
.lock-countdown { font-size: 1.1rem; font-weight: 700; color: var(--red); font-family: 'IBM Plex Mono', monospace; }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="card" id="card">

  <div class="locked-overlay" id="lockedOverlay">
    <div class="lock-icon">🔒</div>
    <div class="lock-title">Access Restricted</div>
    <div class="lock-sub">Too many requests. Try again in</div>
    <div class="lock-countdown" id="lockCountdown">--:--</div>
  </div>

  <div class="header">
    <div class="logo">L</div>
    <div class="header-info">
      <div class="header-title">Lumyra<span>.</span></div>
      <div class="header-sub">key system v2</div>
    </div>
    <div class="version-badge">Secure</div>
  </div>

  <div class="divider"></div>

  <div class="key-section" id="keySection">
    <div class="key-label">Active key</div>
    <div class="key-box">
      <div class="key-top">
        <div class="key-value" id="keyDisplay"></div>
        <button class="copy-btn" id="copyBtn">Copy</button>
      </div>
      <div class="expiry-row">
        <div class="expiry-bar-wrap">
          <div class="expiry-bar-fill" id="expiryBar" style="width:100%"></div>
        </div>
        <div class="expiry-text" id="expiryText">—</div>
      </div>
    </div>
  </div>

  <button class="gen-btn" id="unlockBtn">Complete verification</button>
  <button class="gen-btn" id="genBtn" style="display:none">Generate key</button>

  <div class="alert" id="alert">
    <span class="alert-icon" id="alertIcon"></span>
    <span id="alertMsg"></span>
  </div>

  <div class="info-list">
    <div class="info-row">Keys expire after 24 hours</div>
    <div class="info-row">HWID-locked on first use</div>
    <div class="info-row">One key per IP per day</div>
  </div>

  <div class="footer">© 2026 Lumyra — All rights reserved</div>
</div>

<script>
(() => {
  const _fetch = window.fetch.bind(window);

  const API          = 'https://lumyra-api.vercel.app/api';
  const STORE_KEY    = 'lumyra_k2';
  const LOCK_KEY     = 'lumyra_lock';
  const ATTEMPT_KEY  = 'lumyra_attempts';
  const FINGERPRINT_KEY = 'lumyra_fp';
  const MAX_ATTEMPTS = 3;
  const LOCK_MS      = 60 * 60 * 1000;
  const KEY_TTL      = 24 * 60 * 60 * 1000;
  const SECURITY_VERSION = 3;

  let _lvDone = false;

  // Enhanced device fingerprinting
  function getDeviceFingerprint() {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    ctx.textBaseline = 'top';
    ctx.font = '14px Arial';
    ctx.fillText('Device fingerprint', 2, 2);
    
    const fingerprint = {
      canvas: canvas.toDataURL(),
      userAgent: navigator.userAgent.substring(0, 200),
      language: navigator.language,
      platform: navigator.platform,
      screen: `${screen.width}x${screen.height}`,
      timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
      webgl: getWebGLFingerprint(),
      fonts: detectFonts(),
      audio: getAudioFingerprint()
    };
    
    return btoa(JSON.stringify(fingerprint)).substring(0, 64);
  }

  function getWebGLFingerprint() {
    try {
      const canvas = document.createElement('canvas');
      const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
      if (!gl) return 'none';
      return gl.getParameter(gl.VENDOR) + '|' + gl.getParameter(gl.RENDERER);
    } catch { return 'error'; }
  }

  function detectFonts() {
    const testFonts = ['Arial', 'Helvetica', 'Times New Roman', 'Courier New', 'Verdana', 'Georgia', 'Palatino', 'Garamond', 'Bookman', 'Comic Sans MS', 'Trebuchet MS', 'Arial Black', 'Impact'];
    const detected = [];
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    
    testFonts.forEach(font => {
      ctx.font = `72px monospace`;
      const baseline = ctx.measureText('mmmmmmmmmmlli').width;
      ctx.font = `72px '${font}', monospace`;
      if (ctx.measureText('mmmmmmmmmmlli').width !== baseline) {
        detected.push(font);
      }
    });
    
    return detected.slice(0, 5).join(',');
  }

  function getAudioFingerprint() {
    try {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      const context = new AudioContext();
      const oscillator = context.createOscillator();
      const analyser = context.createAnalyser();
      const gain = context.createGain();
      
      oscillator.connect(analyser);
      analyser.connect(gain);
      oscillator.start(0);
      
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      
      oscillator.stop();
      context.close();
      
      return Array.from(data.slice(0, 10)).join('');
    } catch { return 'error'; }
  }

  // Secure token generation with multiple layers
  function makeRequestToken() {
    const ts = Math.floor(Date.now() / 10000);
    const fp = getDeviceFingerprint();
    const random = Math.random().toString(36).substring(2);
    const combined = `lumyra-${ts}-${fp}-${random}-${SECURITY_VERSION}`;
    
    // Multiple encoding layers
    let encoded = btoa(combined);
    encoded = encoded.split('').reverse().join('');
    encoded = btoa(encoded + ts);
    return encoded.substring(0, 64);
  }

  // Enhanced attempt tracking with IP-like detection
  function getAttempts() {
    try { 
      const data = JSON.parse(localStorage.getItem(ATTEMPT_KEY) || '{"n":0,"t":0,"fp":null}');
      const currentFp = getDeviceFingerprint();
      
      // Reset if fingerprint changes (potential bypass)
      if (data.fp && data.fp !== currentFp) {
        return { n: MAX_ATTEMPTS, t: Date.now() };
      }
      
      return { ...data, fp: currentFp }; 
    } catch { return { n: 0, t: 0, fp: getDeviceFingerprint() }; }
  }

  function bumpAttempt() {
    const a = getAttempts(); 
    a.n++; 
    a.t = Date.now();
    localStorage.setItem(ATTEMPT_KEY, JSON.stringify(a));
    
    // Auto-lock on suspicious activity
    if (a.n >= MAX_ATTEMPTS - 1) {
      setClientLock();
    }
  }

  function resetAttempts() { 
    localStorage.removeItem(ATTEMPT_KEY);
    // Store successful fingerprint for future validation
    localStorage.setItem(FINGERPRINT_KEY, getDeviceFingerprint());
  }

  // Enhanced client lock detection
  function isClientLocked() {
    try {
      const lock = JSON.parse(localStorage.getItem(LOCK_KEY) || 'null');
      if (!lock) return false;
      
      // Check if lock expired
      if (Date.now() > lock.until) { 
        localStorage.removeItem(LOCK_KEY); 
        return false; 
      }
      
      // Extended lock for repeated violations
      const violations = lock.violations || 0;
      if (violations >= 3) {
        return lock.until + (LOCK_MS * violations); // Exponential backoff
      }
      
      return lock.until;
    } catch { return false; }
  }

  function setClientLock() {
    const existing = JSON.parse(localStorage.getItem(LOCK_KEY) || '{"violations":0}');
    existing.violations = (existing.violations || 0) + 1;
    existing.until = Date.now() + (LOCK_MS * Math.pow(2, existing.violations - 1));
    localStorage.setItem(LOCK_KEY, JSON.stringify(existing));
  }

  // Anti-tampering checks
  function detectTampering() {
    // Check for dev tools
    if (window.outerHeight - window.innerHeight > 200 || window.outerWidth - window.innerWidth > 200) {
      return true;
    }
    
    // Check for debugger
    if (window.console && (console.debug || console.table)) {
      const start = performance.now();
      debugger;
      if (performance.now() - start > 100) {
        return true;
      }
    }
    
    // Check for modified DOM
    if (document.querySelector('[style*="display: none"]')) {
      return true;
    }
    
    return false;
  }

  // Secure key storage with encryption
  function saveKey(key, expiresAt) {
    const encrypted = btoa(JSON.stringify({ 
      key, 
      expiresAt, 
      fp: getDeviceFingerprint(),
      timestamp: Date.now()
    }));
    localStorage.setItem(STORE_KEY, encrypted);
  }

  function loadKey() {
    try {
      const encrypted = localStorage.getItem(STORE_KEY);
      if (!encrypted) return null;
      
      const data = JSON.parse(atob(encrypted));
      const currentFp = getDeviceFingerprint();
      
      // Validate fingerprint
      if (data.fp !== currentFp) {
        localStorage.removeItem(STORE_KEY);
        return null;
      }
      
      // Validate expiration
      if (Date.now() >= new Date(data.expiresAt).getTime()) { 
        localStorage.removeItem(STORE_KEY); 
        return null; 
      }
      
      // Check for key age (prevent replay attacks)
      const keyAge = Date.now() - data.timestamp;
      if (keyAge > KEY_TTL * 2) {
        localStorage.removeItem(STORE_KEY);
        return null;
      }
      
      return data;
    } catch { return null; }
  }

  function showAlert(msg, type = 'err') {
    const icons = { err: '', info: '', warn: '' };
    document.getElementById('alertIcon').textContent = icons[type] || '';
    document.getElementById('alertMsg').textContent  = msg;
    document.getElementById('alert').className = `alert show ${type}`;
  }

function hideAlert() {
    document.getElementById('alert').className = 'alert';
}
  
  function setGenBtn(loading) {
    const btn = document.getElementById('genBtn');
    btn.disabled = loading;
    btn.innerHTML = loading ? '<span class="spin"></span>Generating…' : 'Generate key';
  }

  function showKey(key, expiresAt) {
    document.getElementById('keyDisplay').textContent = key;
    document.getElementById('keySection').classList.add('visible');
    updateExpiry(expiresAt);
  }

  function updateExpiry(expiresAt) {
    const now  = Date.now();
    const end  = new Date(expiresAt).getTime();
    const left = Math.max(0, end - now);
    const pct  = Math.min(100, (left / KEY_TTL) * 100);
    document.getElementById('expiryBar').style.width = pct + '%';
    if (left <= 0) { document.getElementById('expiryText').textContent = 'expired'; return; }
    const h = Math.floor(left / 3600000);
    const m = Math.floor((left % 3600000) / 60000);
    const s = Math.floor((left % 60000) / 1000);
    document.getElementById('expiryText').textContent =
      h > 0 ? `${h}h ${m}m` : m > 0 ? `${m}m ${s}s` : `${s}s`;
  }

  let lockInterval = null;

  function showLockout(until) {
    document.getElementById('lockedOverlay').classList.add('show');
    if (lockInterval) clearInterval(lockInterval);
    lockInterval = setInterval(() => {
      const left = Math.max(0, until - Date.now());
      if (left === 0) {
        clearInterval(lockInterval);
        document.getElementById('lockedOverlay').classList.remove('show');
        localStorage.removeItem(LOCK_KEY);
        return;
      }
      const m = String(Math.floor(left / 60000)).padStart(2, '0');
      const s = String(Math.floor((left % 60000) / 1000)).padStart(2, '0');
      document.getElementById('lockCountdown').textContent = `${m}:${s}`;
    }, 1000);
  }

  async function generateKey() {
    hideAlert();

    if (!_lvDone) { showAlert('Complete the verification first.', 'warn'); return; }

    const lockUntil = isClientLocked();
    if (lockUntil) { showLockout(lockUntil); return; }

    const existing = loadKey();
    if (existing) { showAlert('You already have an active key.', 'info'); showKey(existing.key, existing.expiresAt); return; }

    const att = getAttempts();
    if (att.n >= MAX_ATTEMPTS && Date.now() - att.t < 30000) { setClientLock(); showLockout(Date.now() + LOCK_MS); return; }

    setGenBtn(true);
    bumpAttempt();

    try {
      const res = await _fetch(`${API}/generate-key`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Request-Token': makeRequestToken() },
        body: JSON.stringify({ _t: Date.now() }),
      });

      // Handle rate limiting
      if (res.status === 429) {
        setClientLock(); 
        showLockout(Date.now() + LOCK_MS);
        showAlert('Rate limit reached. Try again in 1 hour.', 'warn');
        setGenBtn(false); 
        return;
      }

      // Parse response
      let data;
      try {
        data = await res.json();
      } catch (e) {
        console.error('Failed to parse JSON response:', e);
        showAlert('Invalid server response. Try again.', 'err');
        setGenBtn(false); 
        return;
      }

      // Handle non-successful responses
      if (!res.ok) {
        const errorMsg = data?.error || data?.message || `Server error: ${res.status}`;
        console.error('API Error:', errorMsg, data);
        showAlert(errorMsg, 'err');
        setGenBtn(false); 
        return;
      }

      // Validate key data
      if (!data || !data.key) {
        console.error('Invalid response data:', data);
        showAlert('Invalid key received from server.', 'err');
        setGenBtn(false); 
        return;
      }

      // Success - save and display key
      const expiresAt = data.expiresAt || new Date(Date.now() + KEY_TTL).toISOString();
      saveKey(data.key, expiresAt);
      resetAttempts();
      showKey(data.key, expiresAt);
      showAlert('Key generated successfully!', 'info');

    } catch (error) {
      console.error('Network error:', error);
      showAlert('Connection failed. Check your internet and try again.', 'err');
    } finally {
      setGenBtn(false);
    }
  }

  document.getElementById('unlockBtn').addEventListener('click', function () {
    window.location.href = 'https://direct-link.net/4321252/kL7UldRa6FCG';
  });

  document.getElementById('genBtn').addEventListener('click', generateKey);

  document.getElementById('copyBtn').addEventListener('click', function () {
    const key = document.getElementById('keyDisplay').textContent;
    if (!key) return;
    navigator.clipboard.writeText(key).then(() => {
      this.textContent = '✓ Copied';
      this.classList.add('ok');
      setTimeout(() => { this.textContent = 'Copy'; this.classList.remove('ok'); }, 1800);
    });
  });

  function init() {
    const lockUntil = isClientLocked();
    if (lockUntil) { showLockout(lockUntil); return; }

    const stored = loadKey();
    if (stored) {
      showKey(stored.key, stored.expiresAt);
      setInterval(() => updateExpiry(stored.expiresAt), 1000);
      document.getElementById('unlockBtn').style.display = 'none';
      document.getElementById('genBtn').style.display = 'block';
      _lvDone = true;
      return;
    }

    const params = new URLSearchParams(window.location.search);
    if (params.get('verified') === '1') {
      _lvDone = true;
      try { sessionStorage.setItem('_lv', '1'); } catch {}
      document.getElementById('unlockBtn').style.display = 'none';
      document.getElementById('genBtn').style.display = 'block';
      window.history.replaceState({}, '', window.location.pathname);
      showAlert('Verified. You can now generate your key.', 'info');
      return;
    }

    if (sessionStorage.getItem('_lv') === '1') {
      _lvDone = true;
      document.getElementById('unlockBtn').style.display = 'none';
      document.getElementById('genBtn').style.display = 'block';
    }
  }

  init();

  setInterval(() => {
    const stored = loadKey();
    if (stored) updateExpiry(stored.expiresAt);
  }, 1000);

})();
</script>
</body>
</html>
