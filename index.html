<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumyra Key System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --surface: #0f0f0f;
            --surface-2: #141414;
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(255,255,255,0.12);
            --accent: #6270f5;
            --accent-dim: rgba(98, 112, 245, 0.12);
            --text-primary: #f2f2f2;
            --text-secondary: #6a6a6a;
            --text-muted: #3a3a3a;
            --green: #4caf7d;
            --green-dim: rgba(76, 175, 125, 0.1);
            --red-dim: rgba(255, 90, 90, 0.08);
            --red: #ff7070;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        .card {
            background: var(--surface);
            border-radius: 18px;
            padding: 2rem;
            max-width: 440px;
            width: 100%;
            border: 1px solid var(--border);
            position: relative;
            z-index: 1;
            animation: cardIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .card::before {
            content: '';
            position: absolute;
            top: -1px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            border-radius: 2px;
            opacity: 0.6;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
        }

        .logo {
            width: 34px;
            height: 34px;
            border-radius: 9px;
            background: var(--accent-dim);
            border: 1px solid rgba(98, 112, 245, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-weight: 500;
            font-size: 0.95rem;
            letter-spacing: -0.02em;
        }

        .header-title {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 400;
            color: var(--text-primary);
            letter-spacing: -0.02em;
        }

        h1 span {
            color: var(--accent);
        }

        .badge {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-secondary);
            background: var(--surface-2);
            border: 1px solid var(--border);
            padding: 0.18rem 0.55rem;
            border-radius: 4px;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 0 0 1.75rem 0;
        }

        .key-section {
            margin-bottom: 1.25rem;
            animation: fadeSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(-8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .key-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 0.6rem;
            font-weight: 500;
        }

        .key-wrapper {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            transition: border-color 0.2s ease;
        }

        .key-wrapper:hover {
            border-color: var(--border-hover);
        }

        .key-value {
            font-family: 'Geist Mono', monospace;
            font-size: 0.85rem;
            font-weight: 400;
            color: #c8c8c8;
            word-break: break-all;
            letter-spacing: 0.03em;
            flex: 1;
            line-height: 1.5;
        }

        .key-actions {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .copy-btn {
            background: var(--surface-2);
            color: var(--text-secondary);
            border: 1px solid var(--border);
            padding: 0.4rem 0.85rem;
            border-radius: 7px;
            font-size: 0.75rem;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: #1c1c1c;
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .copy-btn.copied {
            background: var(--green-dim);
            border-color: rgba(76, 175, 125, 0.2);
            color: var(--green);
        }

        .expiry-pill {
            font-size: 0.65rem;
            font-weight: 500;
            font-family: 'Geist Mono', monospace;
            color: var(--accent);
            background: var(--accent-dim);
            border: 1px solid rgba(98, 112, 245, 0.18);
            padding: 0.25rem 0.6rem;
            border-radius: 5px;
            white-space: nowrap;
        }

        .generate-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.875rem;
            border-radius: 11px;
            font-size: 0.875rem;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.15s ease, opacity 0.2s ease;
            margin-bottom: 1rem;
            letter-spacing: -0.01em;
            position: relative;
            overflow: hidden;
        }

        .generate-btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, transparent 60%);
            pointer-events: none;
        }

        .generate-btn:hover:not(:disabled) {
            background: #717fff;
            transform: translateY(-1px);
        }

        .generate-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .generate-btn:disabled {
            background: var(--surface-2);
            color: var(--text-muted);
            cursor: not-allowed;
            border: 1px solid var(--border);
        }

        .warning {
            border-radius: 9px;
            padding: 0.7rem 1rem;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
            line-height: 1.4;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .warning.show { display: flex; }

        .features {
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.1rem 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.65rem;
            background: var(--bg);
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            font-weight: 400;
        }

        .feature-dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.6;
            flex-shrink: 0;
        }

        .loading {
            display: inline-block;
            width: 13px;
            height: 13px;
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            border-top-color: rgba(255,255,255,0.7);
            animation: spin 0.65s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.65rem;
            margin-top: 1.5rem;
            letter-spacing: 0.04em;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="logo">L</div>
            <div class="header-title">
                <h1>Lumyra Key System<span>.</span></h1>
                <span class="badge"></span>
            </div>
        </div>

        <div class="divider"></div>

        <div class="key-section" id="keySection" style="display: none;">
            <div class="key-label">Active key</div>
            <div class="key-wrapper">
                <div class="key-value" id="keyDisplay"></div>
                <div class="key-actions">
                    <span class="expiry-pill" id="expiryBadge">24h</span>
                    <button class="copy-btn" id="copyBtn" onclick="copyKey()">
                        Copy
                    </button>
                </div>
            </div>
        </div>

        <button class="generate-btn" id="generateBtn" onclick="generateKey()">
            Generate key
        </button>

        <div class="warning" id="warning">
            <span id="warningMessage"></span>
        </div>

        <div class="features">
            <div class="feature-item">
                <span class="feature-dot"></span>
                Keys expire after 24 hours
            </div>
            <div class="feature-item">
                <span class="feature-dot"></span>
                HWID locked on first use
            </div>
        </div>

        <div class="footer">© 2026 Lumyra | All rights Reserved</div>
    </div>

    <script>
        const STORAGE_KEY = 'lumyra_license';
        const API_URL = 'https://lumyra-api.vercel.app/api';

        async function generateKey() {
            const generateBtn = document.getElementById('generateBtn');
            
            const existing = getStoredKey();
            if (existing && !isExpired(existing.timestamp)) {
                showWarning('You already have an active key', false);
                return;
            }

            const originalText = generateBtn.textContent;
            generateBtn.innerHTML = '<span class="loading"></span> Generating…';
            generateBtn.disabled = true;
            hideWarning();

            try {
                const res = await fetch(`${API_URL}/generate-key`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error || 'Failed');
                if (!data.key) throw new Error('Invalid response');

                const keyData = {
                    key: data.key,
                    timestamp: Date.now()
                };
                localStorage.setItem(STORAGE_KEY, JSON.stringify(keyData));

                document.getElementById('keyDisplay').textContent = data.key;
                const keySection = document.getElementById('keySection');
                keySection.style.display = 'block';
                
                const copyBtn = document.getElementById('copyBtn');
                copyBtn.textContent = 'Copy';
                copyBtn.classList.remove('copied');

                updateExpiryBadge(keyData.timestamp);

            } catch (err) {
                console.error(err);
                showWarning('Could not generate key. Try again.', true);
            } finally {
                generateBtn.textContent = originalText;
                generateBtn.disabled = false;
            }
        }

        function getStoredKey() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (!stored) return null;
            try {
                return JSON.parse(stored);
            } catch {
                return null;
            }
        }

        function isExpired(timestamp) {
            return Date.now() - timestamp >= 24 * 60 * 60 * 1000;
        }

        function getRemaining(timestamp) {
            const remaining = (24 * 60 * 60 * 1000) - (Date.now() - timestamp);
            if (remaining <= 0) return null;
            const hours = Math.floor(remaining / (60 * 60 * 1000));
            const mins = Math.floor((remaining % (60 * 60 * 1000)) / (60 * 1000));
            return `${hours}h ${mins}m`;
        }

        function updateExpiryBadge(timestamp) {
            const badge = document.getElementById('expiryBadge');
            const remaining = getRemaining(timestamp);
            badge.textContent = remaining ? `${remaining}` : 'expired';
        }

        function copyKey() {
            const key = document.getElementById('keyDisplay').textContent;
            navigator.clipboard.writeText(key).then(() => {
                const btn = document.getElementById('copyBtn');
                btn.textContent = '✓ Copied';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copy';
                    btn.classList.remove('copied');
                }, 1800);
            });
        }

        function showWarning(msg, isError = true) {
            const warning = document.getElementById('warning');
            document.getElementById('warningMessage').textContent = msg;
            if (isError) {
                warning.style.background = 'var(--red-dim)';
                warning.style.border = '1px solid rgba(255,112,112,0.15)';
                warning.style.color = 'var(--red)';
            } else {
                warning.style.background = 'var(--green-dim)';
                warning.style.border = '1px solid rgba(76,175,125,0.15)';
                warning.style.color = 'var(--green)';
            }
            warning.classList.add('show');
        }

        function hideWarning() {
            document.getElementById('warning').classList.remove('show');
        }

        window.onload = () => {
            const existing = getStoredKey();
            if (existing && !isExpired(existing.timestamp)) {
                document.getElementById('keyDisplay').textContent = existing.key;
                document.getElementById('keySection').style.display = 'block';
                updateExpiryBadge(existing.timestamp);
            } else if (existing) {
                localStorage.removeItem(STORAGE_KEY);
            }
        };
    </script>
</body>
</html>
